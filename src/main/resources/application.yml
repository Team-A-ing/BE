spring:
  profiles:
    active: local
  application:
    name: readb

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 30MB
      max-request-size: 30MB

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 86400000  # 24시간

openai:
  api-key: ${OPENAI_API_KEY}
  whisper:
    url: https://api.openai.com/v1/audio/transcriptions
    model: whisper-1
    max-file-size-mb: 25
  gpt:
    url: https://api.openai.com/v1/chat/completions
    model: gpt-4o-mini

claude:
  api-key: ${CLAUDE_API_KEY}
  url: https://api.anthropic.com/v1/messages
  model: claude-sonnet-4-5
  max-tokens: 4096

supabase:
  url: ${SUPABASE_URL}
  key: ${SUPABASE_KEY}
  bucket: recordings

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs
