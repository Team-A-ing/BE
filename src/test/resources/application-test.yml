spring:
  datasource:
    url: jdbc:h2:mem:readb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

jwt:
  secret: test-secret-key-for-readb-application-context-minimum32chars
  access-expiration-ms: 3600000
  refresh-expiration-ms: 1209600000

cors:
  allowed-origins:
    - "http://localhost:3000"
    - "http://localhost:5173"

openai:
  api-key: test-openai-key
  whisper:
    url: https://api.openai.test/v1/audio/transcriptions
    model: whisper-1
    max-file-size-mb: 25
  gpt:
    url: https://api.openai.test/v1/chat/completions
    model: gpt-4o-mini

claude:
  api-key: test-claude-key
  url: https://api.anthropic.test/v1/messages
  model: claude-sonnet-test
  max-tokens: 1024

supabase:
  url: http://localhost
  key: test-supabase-key
