spring:
  datasource:
    url: jdbc:h2:mem:readb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

jwt:
  secret: test-secret-key-for-readb-application-context-minimum32chars
  access-expiration-ms: 3600000
  refresh-expiration-ms: 1209600000

cors:
  allowed-origins: http://localhost:3000

openai:
  api-key: test-openai-key

claude:
  api-key: test-claude-key

supabase:
  url: http://localhost
  key: test-supabase-key
